name: test main

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout project
      - uses: actions/checkout@v4

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo, sqlite
          coverage: none

      # 3. Setup Composer cache (agar lebih cepat)
      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # 4. Copy .env
      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      # 5. Install PHP dependencies
      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # 6. Generate Laravel App Key
      - name: Generate Application Key
        run: php artisan key:generate

      # 7. Set folder permissions
      - name: Set Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      # 8. Create SQLite DB (untuk testing)
      - name: Prepare SQLite Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      # 9. Run Migrations & Seed
      - name: Run Migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --seed

      # 10. Run Tests (PHPUnit/Pest)
      - name: Run Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test
